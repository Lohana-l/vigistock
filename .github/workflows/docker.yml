name: docker-build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "orchestration/Dockerfile"
      - "dashboards/streamlit/Dockerfile"
      - ".dockerignore"
      - "requirements*.txt"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Chaque cible pointe vers son vrai Dockerfile : l'ancien chemin
        # infra/Dockerfile.<target> n'a jamais existé et le job ne buildait rien.
        include:
          - target: streamlit
            dockerfile: dashboards/streamlit/Dockerfile
          - target: dagster
            dockerfile: orchestration/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.target }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: vigistock-${{ matrix.target }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Scan de vulnérabilités : bloque sur CRITICAL, ignore les CVE sans correctif.
      - name: Trivy scan (${{ matrix.target }})
        uses: aquasecurity/trivy-action@0.29.0
        with:
          image-ref: vigistock-${{ matrix.target }}:ci
          format: table
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true
